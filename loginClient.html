<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Login Cliente - JoinLoja</title>
  <link rel="shortcut icon" href="imgJoinLoja/FaviconJoinLoja.ico" type="image/x-icon">
</head>

<body>
  <div class="main-container">
    <div class="login-box">
      <div class="logo-center">
        <img src="./img/logoZtechTransparente.png" alt="Logo Ztech">
      </div>
      <h3><strong>Bem-Vindo de volta!</strong></h3>

      <form>
        <div class="form-group">
          <label>Usuário:</label>
          <input type="text" class="form-control" placeholder="Insira seu usuário">
        </div>

        <div class="form-group">
          <label>Senha:</label>
          <input type="password" class="form-control" placeholder="Insira sua senha">
        </div>

        <button type="submit" class="btn-block">ENTRAR</button>
      </form>

      <div class="text-center mt-4">
        <p>Entrar com...</p>
        <div class="social-buttons">
          <button type="button" class="social-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
          </button>
          <button type="button" class="social-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="Windows">
          </button>
          <button type="button" class="social-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="LinkedIn">
          </button>
        </div>
      </div>

      <p class="text-center mt-3">Não tem uma conta? <a href="registerClient.html"><strong>Registrar-se</strong></a></p>
    </div>
  </div>

  <!-- Powered By -->
  <div class="powered-by">
    <span>Powered by</span>
    <a href="index.html" class="powered-logo">
      <img src="./imgJoinLoja/LogoJoinLojaWhite.png" alt="JoinLoja">
    </a>
  </div>
</body>
</html>
